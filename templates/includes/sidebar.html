<div class="card border-0 shadow-sm rounded-4 p-3 h-100" style="background: #fff;">
    <div class="mb-3">
        <div class="small fw-bold text-uppercase text-muted">Quản lý chung</div>
    </div>

    <div class="d-grid gap-2">
        <a
            href="{% url 'dashboard:dashboard' %}"
            class="btn text-start rounded-3 fw-semibold {% if active_page == 'dashboard' %}text-white{% else %}btn-light{% endif %}"
            style="{% if active_page == 'dashboard' %}background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border:none;{% else %}border:1px solid #eee;{% endif %}"
        >
            <i class="bi bi-bar-chart-line me-2"></i>Tổng quan
        </a>

        <a
            href="{% url 'dashboard:orders' %}"
            class="btn text-start rounded-3 fw-semibold {% if active_page == 'orders' %}text-white{% else %}btn-light{% endif %}"
            style="{% if active_page == 'orders' %}background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border:none;{% else %}border:1px solid #eee;{% endif %}"
        >
            <span><i class="bi bi-receipt me-2"></i>Đơn hàng</span>
            {% if active_page != 'orders' %}
                <span class="badge rounded-pill bg-warning text-dark">5</span>
            {% endif %}
        </a>

        <a
            href="{% url 'dashboard:products' %}"
            class="btn text-start rounded-3 fw-semibold {% if active_page == 'products' %}text-white{% else %}btn-light{% endif %}"
            style="{% if active_page == 'products' %}background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border:none;{% else %}border:1px solid #eee;{% endif %}"
        >
            <i class="bi bi-box-seam me-2"></i>Sản phẩm
        </a>

        <a
            href="{% url 'dashboard:customers' %}"
            class="btn text-start rounded-3 fw-semibold {% if active_page == 'customers' %}text-white{% else %}btn-light{% endif %}"
            style="{% if active_page == 'customers' %}background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border:none;{% else %}border:1px solid #eee;{% endif %}"
        >
            <i class="bi bi-people me-2"></i>Khách hàng
        </a>
    </div>

    <div class="mt-4 mb-3">
        <div class="small fw-bold text-uppercase text-muted">Thống kê</div>
    </div>

    <div class="d-grid gap-2">
          <a
            href="{% url 'dashboard:reports' %}"
            class="btn text-start rounded-3 fw-semibold d-flex align-items-center justify-content-between {% if active_page == 'orders' %}text-white{% else %}btn-light{% endif %}"
            style="{% if active_page == 'reports' %}background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border:none;{% else %}border:1px solid #eee;{% endif %}"
        >
            <span><i class="bi bi-receipt me-2"></i>Báo cáo doanh thu</span>
            
        </a>
    </div>

    <div class="mt-4 mb-3">
        <div class="small fw-bold text-uppercase text-muted">Cấu hình</div>
    </div>

    <div class="d-grid gap-2">
      
    </div>
    <a
            href="{% url 'dashboard:permissions' %}"
            class="btn text-start rounded-3 fw-semibold d-flex align-items-center justify-content-between {% if active_page == 'orders' %}text-white{% else %}btn-light{% endif %}"
            style="{% if active_page == 'permissions' %}background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border:none;{% else %}border:1px solid #eee;{% endif %}"
        >
            <span><i class="bi bi-receipt me-2"></i>Phân Quyền</span>
            
        </a>
    </div>
