<div class="bg-white rounded-4 shadow-sm p-3 border h-100">
  <div class="small fw-bold text-uppercase text-muted mb-3">Quản lý chung</div>

  <div class="d-grid gap-2 mb-4">
    <a
      href="{% url 'dashboard:dashboard' %}"
      class="btn text-start rounded-3 fw-semibold {% if active_page == 'dashboard' %}btn-danger text-white{% else %}btn-light{% endif %}"
    >
      Tổng quan
    </a>

    <a
      href="{% url 'dashboard:orders' %}"
      class="btn text-start rounded-3 fw-semibold {% if active_page == 'orders' %}btn-danger text-white{% else %}btn-light{% endif %}"
    >
      Đơn hàng
      <span class="badge bg-warning text-dark ms-1">5</span>
    </a>

    <a
      href="{% url 'dashboard:products' %}"
      class="btn text-start rounded-3 fw-semibold {% if active_page == 'products' %}btn-danger text-white{% else %}btn-light{% endif %}"
    >
      Sản phẩm
    </a>

    <a
      href="{% url 'dashboard:customers' %}"
      class="btn text-start rounded-3 fw-semibold {% if active_page == 'customers' %}btn-danger text-white{% else %}btn-light{% endif %}"
    >
      Khách hàng
    </a>
  </div>

  <div class="small fw-bold text-uppercase text-muted mb-3">Thống kê</div>

  <div class="d-grid gap-2 mb-4">
    <a
      href="{% url 'dashboard:reports' %}"
      class="btn text-start rounded-3 fw-semibold {% if active_page == 'reports' %}btn-danger text-white{% else %}btn-light{% endif %}"
    >
      Báo cáo doanh thu
    </a>
  </div>

  <div class="small fw-bold text-uppercase text-muted mb-3">Cấu hình</div>

  <div class="d-grid gap-2">
    <a
      href="{% url 'dashboard:permissions' %}"
      class="btn text-start rounded-3 fw-semibold {% if active_page == 'permissions' %}btn-danger text-white{% else %}btn-light{% endif %}"
    >
      Phân quyền
    </a>
  </div>
</div>
